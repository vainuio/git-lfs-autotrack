- id: git-lfs-autotrack
  name: Auto-track large files with Git LFS
  language: python
  entry: git-lfs-autotrack
  description: >
    Automatically moves files exceeding a line threshold to Git LFS tracking.
    Configure threshold with --max-lines (default: 3000).
    Optionally restrict eligible paths with --glob PATTERN (repeatable).
    Requires git-lfs to be installed.
  args: [--max-lines=3000]
  pass_filenames: true
  exclude: '\.(py|pyi|js|mjs|cjs|ts|jsx|tsx|go|rs|java|c|h|cpp|hpp|cc|cxx|cs|rb|php|swift|kt|sh|bash|zsh|html|htm|css|scss|sass|less|sql|md|rst|txt)$'
  # types_or / files / exclude are configured in .pre-commit-config.yaml.
  #
  # Minimal example:
  #   hooks:
  #     - id: git-lfs-autotrack
  #       types_or: [json, toml]
  #       args:
  #         - --max-lines=3000
  #         - --glob=**/_data/*
  #         - --glob=**/data/*
